name: Release

on:
  workflow_dispatch:
    inputs:
      bump_type:
        description: "Version bump type"
        required: true
        type: choice
        options:
          - patch
          - minor
          - major

permissions:
  contents: write
  id-token: write

jobs:
  release:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate branch
        run: |
          if [ "$(git branch --show-current)" != "main" ]; then
            echo "Error: Release must be from main branch"
            exit 1
          fi

      - name: Configure git
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

      - name: Install uv
        uses: astral-sh/setup-uv@v5

      - name: Set up Python 3.12
        run: uv python install 3.12

      - name: Install dependencies
        run: uv sync --dev

      - name: Lint
        run: uv run ruff check src/ tests/

      - name: Run tests
        run: uv run pytest tests/ -v

      - name: Bump version
        id: bump
        run: |
          uv run cz bump --increment ${{ inputs.bump_type }} --yes
          echo "version=$(uv run cz version -p)" >> "$GITHUB_OUTPUT"

      - name: Build
        run: uv build

      - name: Extract release notes from CHANGELOG
        id: notes
        run: |
          python <<'PY'
          import pathlib
          import re
          import sys

          version = "${{ steps.bump.outputs.version }}"
          changelog_path = pathlib.Path("CHANGELOG.md")

          if not changelog_path.exists():
              print(f"Error: CHANGELOG.md not found", file=sys.stderr)
              sys.exit(1)

          changelog = changelog_path.read_text(encoding="utf-8")
          # Match version section more flexibly
          pattern = rf"^## (?:v)?{re.escape(version)}(?:\s+\([^)]+\))?\s*$(.*?)(?=^## |\Z)"
          match = re.search(pattern, changelog, flags=re.MULTILINE | re.DOTALL)

          if not match:
              print(f"Error: Could not find CHANGELOG section for version {version}", file=sys.stderr)
              print(f"Looked for pattern: ## v{version} or ## {version}", file=sys.stderr)
              sys.exit(1)

          body = match.group(0).strip()
          out = pathlib.Path("${{ github.workspace }}") / "release_notes.md"
          out.write_text(body + "\n", encoding="utf-8")
          print(f"Extracted release notes for v{version}")
          PY

      - name: Push changes and tags
        run: |
          git push origin main
          git push origin "v${{ steps.bump.outputs.version }}"

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1

      - name: Create GitHub Release
        env:
          GH_TOKEN: ${{ github.token }}
        run: gh release create "v${{ steps.bump.outputs.version }}" --notes-file release_notes.md
